<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rifa Beneficente - Daniel & Emanuelli</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#f7f3ec;
      color:#333;
      padding:20px;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    /* FOTO DO CASAL */
    .banner-topo{
      width:100%;
      margin-bottom:30px;
      text-align:center;
    }

    .banner-topo img{
      width:100%;
      max-width:500px; /* FOTO MENOR */
      border-radius:20px;
      box-shadow:0 4px 15px rgba(0,0,0,0.15);
      object-fit:cover;
    }

    .topo{
      text-align:center;
      margin-bottom:30px;
    }

    .topo h1{
      font-size:48px;
      color:#4d2c13;
    }

    .topo h2{
      color:#c9972b;
      font-size:38px;
      margin-top:5px;
    }

    .info{
      text-align:center;
      margin-top:15px;
      font-size:20px;
    }

    .valor{
      margin-top:20px;
      background:#4d2c13;
      color:white;
      display:inline-block;
      padding:15px 40px;
      border-radius:12px;
      font-size:35px;
      font-weight:bold;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(70px,1fr));
      gap:10px;
      margin-top:40px;
    }

    .numero{
      background:white;
      border:2px solid #c9972b;
      border-radius:10px;
      padding:15px 5px;
      text-align:center;
      cursor:pointer;
      transition:0.2s;
      font-weight:bold;
      user-select:none;
    }

    .numero:hover{
      transform:scale(1.05);
    }

    .selecionado{
      background:#2ecc71;
      color:white;
      border-color:#27ae60;
    }

    .comprado{
      background:#e74c3c;
      color:white;
      border-color:#c0392b;
      cursor:not-allowed;
    }

    .legenda{
      display:flex;
      gap:20px;
      justify-content:center;
      margin-top:30px;
      flex-wrap:wrap;
    }

    .item-legenda{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:bold;
    }

    .cor{
      width:20px;
      height:20px;
      border-radius:5px;
    }

    .acoes{
      text-align:center;
      margin-top:40px;
    }

    button{
      background:#c9972b;
      color:white;
      border:none;
      padding:15px 35px;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#b8861f;
    }

    .selecionados{
      margin-top:20px;
      font-size:20px;
      text-align:center;
    }

    .pix{
      margin-top:30px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
      color:#4d2c13;
    }

    @media(max-width:600px){

      body{
        padding:10px;
      }

      .topo h1{
        font-size:32px;
      }

      .topo h2{
        font-size:26px;
      }

      .valor{
        font-size:28px;
      }

      .grid{
        grid-template-columns: repeat(auto-fill, minmax(55px,1fr));
        gap:8px;
      }

      .numero{
        padding:12px 4px;
        font-size:14px;
      }

      button{
        width:100%;
      }

      .banner-topo img{
        max-width:320px;
      }

    }

  </style>
</head>

<body>

<div class="container">

  <!-- FOTO DO CASAL -->
  <div class="banner-topo">
    <img src="daniel e manu.jpg" alt="Daniel e Emanuelli">
  </div>

  <div class="topo">

    <h1>RIFA BENEFICENTE</h1>

    <h2>Daniel & Emanuelli</h2>

    <div class="info">
      Cada número custa apenas <strong>R$ 15,00</strong>
    </div>

    <div class="valor">
      450 NÚMEROS
    </div>

  </div>

  <div class="legenda">

    <div class="item-legenda">
      <div class="cor" style="background:#fff;border:2px solid #c9972b;"></div>
      Disponível
    </div>

    <div class="item-legenda">
      <div class="cor" style="background:#2ecc71;"></div>
      Selecionado
    </div>

    <div class="item-legenda">
      <div class="cor" style="background:#e74c3c;"></div>
      Comprado
    </div>

  </div>

  <div class="grid" id="grid"></div>

  <div class="selecionados">
    <strong>Números escolhidos:</strong>
    <span id="listaSelecionados">Nenhum</span>
  </div>

  <div class="acoes">

    <button onclick="enviarWhatsApp()">
      Reservar pelo WhatsApp 43984420862
    </button>

  </div>

  <div class="pix">
    PIX 43984299837
  </div>

</div>

<script>

  const numerosComprados = [
    "002",
    "012",
    "030",
    "065",
    "146",
    "233",
    "327",
    "333",
    "049",
    "025",
    "055"
  ];

  let selecionados = [];

  const grid = document.getElementById("grid");

  for(let i = 1; i <= 450; i++){

    const numero = i.toString().padStart(3, "0");

    const div = document.createElement("div");

    div.classList.add("numero");

    div.innerText = numero;

    if(numerosComprados.includes(numero)){

      div.classList.add("comprado");

    } else {

      div.addEventListener("click", () => {

        div.classList.toggle("selecionado");

        if(selecionados.includes(numero)){

          selecionados = selecionados.filter(n => n !== numero);

        } else {

          selecionados.push(numero);

        }

        atualizarLista();

      });

    }

    grid.appendChild(div);

  }

  function atualizarLista(){

    const lista = document.getElementById("listaSelecionados");

    if(selecionados.length === 0){

      lista.innerText = "Nenhum";

    } else {

      lista.innerText = selecionados.join(", ");

    }

  }

  function enviarWhatsApp(){

    if(selecionados.length === 0){

      alert("Escolha pelo menos um número.");

      return;

    }

    const mensagem =
      `Olá! Quero reservar os números: ${selecionados.join(", ")}`;

    const telefone = "5543984420862";

    const url =
      `https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`;

    window.open(url, "_blank");

  }

</script>

</body>
</html>
